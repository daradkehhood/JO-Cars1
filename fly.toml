app = 'jo-cars'
primary_region = 'ams'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  [build.args]
    DATABASE_URL = 'postgresql://neondb_owner:npg_wefC9Y8DFtBx@ep-damp-cloud-awlu5hwj.c-12.us-east-1.aws.neon.tech/neondb?sslmode=require'

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  NEXT_TELEMETRY_DISABLED = '1'

[http_service]
  internal_port = 8080
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  force_machines = true

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
